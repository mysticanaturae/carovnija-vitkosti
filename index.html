function saveDailyEntry(date) {
  if (!date) return;

  const key = "entry_" + date.toISOString().split("T")[0];

  const entry = {
    feedBody: document.getElementById("feedBody").value.trim(),
    feedMind: document.getElementById("feedMind").value.trim(),
    feedSoul: document.getElementById("feedSoul").value.trim(),
    feedSpirit: document.getElementById("feedSpirit").value.trim(),
    observations: document.getElementById("observations").value.trim(),
    schedule: document.getElementById("schedule").value.trim(),
    massage: document.getElementById("massage").checked,
    hypnosis: document.getElementById("hypnosis").checked,
    other: document.getElementById("other").checked
  };

  localStorage.setItem(key, JSON.stringify(entry));
}

document.getElementById("exportBtn").onclick = () => {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  let y = 10;

  pdf.setFont("Helvetica");
  pdf.setFontSize(16);
  pdf.text("Moj 21-dnevni dnevnik", 10, y);

  y += 10;

  for (let i = 0; i < daysPerCycle; i++) {
    const date = new Date(startDate);
    date.setDate(date.getDate() + i);

    const key = "entry_" + date.toISOString().split("T")[0];
    const entry = JSON.parse(localStorage.getItem(key) || "{}");

    if (y > 270) { // nova stran
      pdf.addPage();
      y = 10;
    }

    pdf.setFontSize(12);
    pdf.text(`Dan ${i + 1} – ${date.toLocaleDateString()}`, 10, y);
    y += 6;

    pdf.setFontSize(10);

    const addText = (label, value) => {
      if (!value) return;
      const lines = pdf.splitTextToSize(`${label}: ${value}`, 180);
      pdf.text(lines, 10, y);
      y += lines.length * 5;
    };

    addText("Telo", entry.feedBody);
    addText("Um", entry.feedMind);
    addText("Duša", entry.feedSoul);
    addText("Duh", entry.feedSpirit);
    addText("Spoznanja", entry.observations);
    addText("Koledar", entry.schedule);

    y += 5;
  }

  pdf.save("Moj_dnevnik.pdf");
};

// --- NALOŽI VNOS ZA TA DAN ---
function loadDailyEntry(date) {
  if (!date) return;

  const key = "entry_" + date.toISOString().split("T")[0];
  const saved = localStorage.getItem(key);

  if (saved) {
    const entry = JSON.parse(saved);
    document.getElementById("feedBody").value = entry.feedBody || "";
    document.getElementById("feedMind").value = entry.feedMind || "";
    document.getElementById("feedSoul").value = entry.feedSoul || "";
    document.getElementById("feedSpirit").value = entry.feedSpirit || "";
    document.getElementById("observations").value = entry.observations || "";
    document.getElementById("schedule").value = entry.schedule || "";
    document.getElementById("massage").checked = entry.massage || false;
    document.getElementById("hypnosis").checked = entry.hypnosis || false;
    document.getElementById("other").checked = entry.other || false;
  } else {
    // če še ni vnosa, počisti polja
    document.getElementById("feedBody").value = "";
    document.getElementById("feedMind").value = "";
    document.getElementById("feedSoul").value = "";
    document.getElementById("feedSpirit").value = "";
    document.getElementById("observations").value = "";
    document.getElementById("schedule").value = "";
    document.getElementById("massage").checked = false;
    document.getElementById("hypnosis").checked = false;
    document.getElementById("other").checked = false;
  }

  // --- prikaz Tzolkin dneva ---
  const dayOffset = Math.floor((date - anchorDate) / (1000 * 60 * 60 * 24));
  const tzNumberIndex = (anchorTone - 1 + dayOffset) % 13;
  const tzSignIndex = (anchorSignIdx + dayOffset) % 20;

  document.getElementById("tzNumber").textContent = tzolkinNumbers[tzNumberIndex];
  document.getElementById("tzSign").textContent = tzolkinSigns[tzSignIndex];
  document.getElementById("tzMeaning").textContent = tzolkinMeanings[tzolkinSigns[tzSignIndex]];

  document.getElementById("tzNumberImg").src = tzolkinNumberImages[tzNumberIndex];
  document.getElementById("tzSignImg").src = tzolkinSignImages[tzSignIndex];

  // prikaz dnevne naloge
  const dayInCycle = currentDayIndex % daysPerCycle;
  document.getElementById("dailyFact").textContent = dailyContent[dayInCycle].fact;
  document.getElementById("dailyTask").textContent = dailyContent[dayInCycle].task;
}

// --- LOAD STATE ---
window.onload = () => {
  // vedno najprej skrij vse
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("onboarding").classList.add("hidden");
  document.getElementById("journey").classList.add("hidden");

  const savedDate = localStorage.getItem("startDate");

  if (savedDate) {
    startDate = new Date(savedDate);
    currentCycle = parseInt(localStorage.getItem("cycle")) || 0;
    currentDayIndex = parseInt(localStorage.getItem("day")) || 0;

    const onboardingDone = localStorage.getItem("onboardingDone") === "true";

    if (onboardingDone) {
      document.getElementById("journey").classList.remove("hidden");
      updateDay();
    } else {
      document.getElementById("onboarding").classList.remove("hidden");
      onIndex = 0;
      showOnboardingScreen();
    }
  } else {
    // če še ni nič shranjeno → pokaži intro
    document.getElementById("intro").classList.remove("hidden");
  }
};

const themeBtn = document.getElementById("toggleTheme");
themeBtn.onclick = () => {
  document.body.classList.toggle("dark-mode");
  localStorage.setItem("theme", document.body.classList.contains("dark-mode") ? "dark" : "light");
};

// ob nalaganju
window.onload = () => {
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
  }
};

// --- UPDATE DAY ---
function updateDay() {
  const globalDay = currentCycle * daysPerCycle + currentDayIndex;

  const d = new Date(startDate);
  d.setDate(d.getDate() + globalDay);

  document.getElementById("dayDate").valueAsDate = d;

  const tzolkin = getTzolkinForDate(d);

  document.getElementById("dayTitle").textContent =
    `Cikel ${currentCycle + 1} – Dan ${currentDayIndex + 1}`;

  document.getElementById("dailyFact").textContent =
    dailyContent[globalDay % 21].fact;

  document.getElementById("dayTask").textContent =
    dailyContent[globalDay % 21].task;

  // 🔮 slike
  document.getElementById("tzolkinNumberImg").src = tzolkin.numberImg;
  document.getElementById("tzolkinSignImg").src = tzolkin.signImg;

  // 🧠 tekst
  document.getElementById("tzolkinInfo").textContent =
    `${tzolkin.number} ${tzolkin.sign}`;

  // ✨ pomen (premium občutek)
  document.getElementById("tzolkinMeaning").textContent =
    tzolkinMeanings[tzolkin.sign] || "";

  updateHypnosis();

function updateCycleProgress() {
  const totalDays = daysPerCycle;
  const progress = ((currentDayIndex + 1) / totalDays) * 100;
  document.getElementById("cycleProgressFill").style.width = progress + "%";
}

function updateDay() {
  // ...tvoja obstoječa koda
  updateCycleProgress();  // dodamo vizualni napredek
}

function closeHypnosis() {
  const player = document.getElementById("hypnosisPlayer");
  player.innerHTML = ""; // počisti player

  // premakni se na naslednji cikel
  currentCycle++;

  // lahko dodaš avtomatski update v dnevnik ali trigger za naslednji dan
  updateDailyLog(currentCycle);
}

// 🔹 POČISTI input za dnevnik pred nalaganjem vnosa
  loadDailyEntry(d);            // nato naloži vnos za ta datum

  localStorage.setItem("cycle", currentCycle);
  localStorage.setItem("day", currentDayIndex);
}

// --- NAVIGACIJA ---
function nextDay() {
  const currentDate = new Date(startDate);
  currentDate.setDate(currentDate.getDate() + currentCycle * daysPerCycle + currentDayIndex);
  saveDailyEntry(currentDate); // shrani pred premikom

  currentDayIndex++;
  if (currentDayIndex >= daysPerCycle) {
    currentDayIndex = 0;
    currentCycle++;
    if (currentCycle >= totalCycles) {
      alert("Zaključila si vseh 5 ciklov ✨");
      return;
    } else {
      alert("Nov cikel ✨");
    }
  }

  updateDay();
}

function prevDay() {
  const currentDate = new Date(startDate);
  currentDate.setDate(currentDate.getDate() + currentCycle * daysPerCycle + currentDayIndex);
  saveDailyEntry(currentDate); // shrani pred premikom

  if (currentDayIndex > 0) {
    currentDayIndex--;
  } else if (currentCycle > 0) {
    currentCycle--;
    currentDayIndex = daysPerCycle - 1;
  }

  updateDay();
}

function askNotificationPermission() {
  if ('Notification' in window && Notification.permission !== "granted") {
    Notification.requestPermission();
  }
}

function showDailyReminder() {
  if (Notification.permission === "granted") {
    new Notification("Čas je za tvoj dnevnik ✨", {
      body: "Odpelji se v svoj dnevnik in beleži svoje misli in občutke.",
      icon: "icon.png"
    });
  }
}

window.onload = () => {
  askNotificationPermission();
  showDailyReminder();  // prikaz enkrat na dan
};

function fadeIn(element) {
  element.classList.remove("hidden");
  element.style.opacity = 0;
  let op = 0;
  const timer = setInterval(() => {
    if (op >= 1) clearInterval(timer);
    element.style.opacity = op;
    op += 0.05;
  }, 20);
}

function fadeOut(element) {
  let op = 1;
  const timer = setInterval(() => {
    if (op <= 0) {
      clearInterval(timer);
      element.classList.add("hidden");
    }
    element.style.opacity = op;
    op -= 0.05;
  }, 20);
}

// --- OFFSETI ---
const numberOffset = 0; // za število
const signOffset = -1;   // za znak

function getTzolkinForDate(date) {
  const diffDays = Math.floor((date - anchorDate) / (1000*60*60*24));

  // indexi z offseti
  const numberIndex = (anchorTone - 1 + diffDays + numberOffset + 13) % 13;
  const signIndex   = (anchorSignIdx + diffDays + signOffset + 20) % 20;

  return {
    number: tzolkinNumbers[numberIndex],
    sign: tzolkinSigns[signIndex],
    numberImg: tzolkinNumberImages[numberIndex],
    signImg: tzolkinSignImages[signIndex],
  };
}

// --- HIPNOZE ---
function updateHypnosis() {
  const container = document.getElementById("hypnosisContainer");
  container.innerHTML = "";

  if (cycleHypnosis[currentCycle]) {
    cycleHypnosis[currentCycle].forEach(link => {
      const btn = document.createElement("button");
      btn.textContent = "Poslušaj hipnozo";

      btn.onclick = () => openHypnosis(link);  // pošlje URL
      container.appendChild(btn);
    });
  }
}

  const player = document.getElementById("hypnosisPlayer");

  player.innerHTML = `
    <div style="text-align:center; color:white; max-width:500px;">

      <p style="margin:20px 0;">

        Vdihni.<br>
        In se zavestno odloči, da si tukaj.

      <button onclick="startHypnosis('${url}')" style="margin-top:20px;">

  player.innerHTML = `

      <iframe

function closeHypnosis() {
  const player = document.getElementById("hypnosisPlayer");
  player.innerHTML = ""; // počisti player

  // premakni se na naslednji cikel
  currentCycle++;

  updateDailyLog(currentCycle);
}

// --- ONBOARDING ---
function startOnboarding() {
  document.getElementById("intro").classList.add("hidden");
  document.getElementById("onboarding").classList.remove("hidden");

  onIndex = 0;
  showOnboardingScreen();
}

function showOnboardingScreen() {
  document.getElementById("onTitle").textContent = onboardingScreens[onIndex].title;
  document.getElementById("onText").textContent = onboardingScreens[onIndex].text;
}

function nextOnboarding() {
  onIndex++;

  if (onIndex >= onboardingScreens.length) {
    document.getElementById("onboarding").classList.add("hidden");
    document.getElementById("journey").classList.remove("hidden");

    // nastavi začetni datum, če še ni
    if (!startDate) startDate = new Date();

    updateDay();
    return;
  }

  showOnboardingScreen();
}

function showCycleReflection() {
  let summary = "";
  for (let i = 0; i < daysPerCycle; i++) {
    const date = new Date(startDate);
    date.setDate(date.getDate() + i);
    const key = "entry_" + date.toISOString().split("T")[0];
    const entry = JSON.parse(localStorage.getItem(key) || "{}");
    summary += `<p>Dan ${i+1}: Telo – ${entry.feedBody || ""}, Mind – ${entry.feedMind || ""}</p>`;
  }
  document.getElementById("reflectionContent").innerHTML = summary;
  document.getElementById("reflectionSummary").classList.remove("hidden");
}

// pokličemo ob zaključku cikla
if (currentDayIndex + 1 === daysPerCycle) showCycleReflection();
